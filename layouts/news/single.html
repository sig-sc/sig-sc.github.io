{{ define "main" }}
<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12 space-y-16">
  <header>
    <h1 class="text-4xl font-bold text-gray-900 dark:text-slate-100">{{ .Title }}</h1>
    <p class="mt-3 text-gray-500 dark:text-slate-400 text-sm">{{ .Description }}</p>
  </header>

  <!-- Important announcement (SWIM merger) -->
  <section>
    <div class="mb-6 p-5 rounded-xl bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800">
      <div class="flex gap-3">
        <div class="flex-shrink-0">
          <svg class="w-5 h-5 text-blue-500 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div>
          <h3 class="font-bold text-gray-900 dark:text-slate-100 mb-1">SWIM研との合併について</h3>
          <p class="text-sm text-gray-700 dark:text-slate-300 leading-relaxed">
            <a href="https://www.ieice.org/iss/swim/jpn/" target="_blank" rel="noopener">ソフトウェアインタプライズモデリング研究会（SWIM研）</a>と当研究会は，
            <strong>2025年度より合併</strong>することとなりました．合併後のウェブサイトはSC研のサイトになります．
          </p>
        </div>
      </div>
    </div>

    <div class="divide-y divide-gray-100 dark:divide-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 overflow-hidden">
      {{ range .Site.Data.news.items }}
      <div class="flex gap-4 px-5 py-3 bg-white dark:bg-slate-800">
        <time class="flex-shrink-0 text-xs text-gray-500 dark:text-slate-400 font-mono pt-0.5 w-24">{{ .date }}</time>
        <p class="text-sm text-gray-700 dark:text-slate-300">{{ .content | markdownify }}</p>
      </div>
      {{ end }}
    </div>
  </section>
</div>
{{ end }}

{{ define "main" }}
<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <header class="mb-10">
    <h1 class="text-4xl font-bold text-gray-900 dark:text-slate-100">{{ .Title }}</h1>
    {{ with .Description }}
    <p class="mt-3 text-gray-500 dark:text-slate-400 text-sm">{{ . }}</p>
    {{ end }}
  </header>

  {{ if .Pages }}
  {{ range (.Pages.GroupByDate "2006") }}
  <section class="mb-8">
    <h2 class="text-lg font-bold text-gray-900 dark:text-slate-100 border-b-2 border-accent pb-1.5 mb-3">{{ .Key }}年</h2>
    <div class="divide-y divide-gray-100 dark:divide-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 overflow-hidden">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="flex gap-4 px-5 py-3 bg-white dark:bg-slate-800 hover:bg-gray-50 dark:hover:bg-slate-700/50 transition-colors no-underline group">
        <time class="flex-shrink-0 text-xs text-gray-500 dark:text-slate-400 font-mono pt-0.5 w-24">
          {{ .Date.Format "2006-01-02" }}
        </time>
        <span class="text-sm text-gray-700 dark:text-slate-300 group-hover:text-primary dark:group-hover:text-primary-light transition-colors">{{ .Title }}</span>
      </a>
      {{ end }}
    </div>
  </section>
  {{ end }}
  {{ else }}
  <p class="text-gray-500 dark:text-slate-400">記事がありません。</p>
  {{ end }}
</div>
{{ end }}

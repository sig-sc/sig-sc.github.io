<header class="bg-primary sticky top-0 z-50 shadow-lg">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center h-16">
      <!-- Logo / Site title -->
      <a href="{{ "/" | relURL }}" class="flex items-center gap-2 group">
        <span class="text-white font-bold text-lg leading-tight group-hover:text-accent transition-colors">
          SIG-SC
        </span>
        <span class="hidden sm:block text-white/70 text-sm">
          サービスコンピューティング研究会
        </span>
      </a>

      <!-- Desktop navigation + right controls (pushed to the right) -->
      <div class="ml-auto flex items-center gap-1">
      <nav class="hidden md:flex items-center gap-1" aria-label="メインナビゲーション">
        <a href="{{ "/" | relURL }}" class="nav-link {{ if .IsHome }}bg-white/20 text-white{{ end }}">ホーム</a>
        <a href="{{ "/history/" | relURL }}" class="nav-link {{ if eq .RelPermalink "/history/" }}bg-white/20 text-white{{ end }}">開催履歴</a>
        <a href="{{ "/statistics/" | relURL }}" class="nav-link {{ if eq .RelPermalink "/statistics/" }}bg-white/20 text-white{{ end }}">統計情報</a>
        <a href="{{ "/committee/" | relURL }}" class="nav-link {{ if eq .RelPermalink "/committee/" }}bg-white/20 text-white{{ end }}">専門委員</a>
        <a href="{{ "/award/" | relURL }}" class="nav-link {{ if eq .RelPermalink "/award/" }}bg-white/20 text-white{{ end }}">表彰</a>
      </nav>

      <!-- Right controls -->
      <div class="flex items-center gap-2">
        <!-- Dark mode toggle -->
        <button
          id="dark-mode-toggle"
          aria-label="ダークモード切り替え"
          class="p-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-colors"
        >
          <!-- Sun icon (shown in dark mode) -->
          <svg id="icon-sun" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <!-- Moon icon (shown in light mode) -->
          <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>

        <!-- Mobile menu button -->
        <button
          id="mobile-menu-btn"
          aria-label="メニューを開く"
          aria-expanded="false"
          class="md:hidden p-2 rounded-lg text-white/80 hover:text-white hover:bg-white/10 transition-colors"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
      </div><!-- /ml-auto -->
    </div>

    <!-- Mobile menu (hidden by default) -->
    <nav id="mobile-menu" class="md:hidden hidden pb-4 border-t border-white/20 mt-2 pt-2" aria-label="モバイルナビゲーション">
      <div class="flex flex-col gap-1">
        <a href="{{ "/" | relURL }}" class="nav-link">ホーム</a>
        <a href="{{ "/history/" | relURL }}" class="nav-link">開催履歴</a>
        <a href="{{ "/statistics/" | relURL }}" class="nav-link">統計情報</a>
        <a href="{{ "/committee/" | relURL }}" class="nav-link">専門委員</a>
        <a href="{{ "/award/" | relURL }}" class="nav-link">表彰</a>
      </div>
    </nav>
  </div>
</header>
